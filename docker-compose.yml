version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aws-cost-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aws_cost_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awscost-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aws-cost-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awscost-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aws-cost-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/aws_cost_dashboard
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - AWS_PROFILE_CONFIG_PATH=/root/.aws/credentials
      - DEBUG=True
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - APP_NAME=AWS Cost Dashboard API
      - APP_VERSION=1.0.0
      - API_V1_PREFIX=/api/v1
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=dev-jwt-secret-key-change-in-production
      - ENCRYPTION_KEY=2nF7qR9xK3mP8vL5tJ4wH6eC1bN0aY3sD7fG2hK9mQ8=
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ~/.aws:/root/.aws:ro # Mount AWS credentials read-only
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - awscost-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aws-cost-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_API_VERSION=v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host
    networks:
      - awscost-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  awscost-network:
    driver: bridge
