# =============================================================================
# Redis StatefulSet
#
# For production on AWS, prefer ElastiCache (managed, Multi-AZ, automated
# failover). This StatefulSet is for self-hosted or non-AWS clusters.
#
# When using ElastiCache:
#   - Delete this file and redis/service.yaml
#   - Set REDIS_HOST in configmap.yaml to the ElastiCache primary endpoint
#   - Set REDIS_PASSWORD in secret.yaml if auth is enabled
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: aws-cost-dashboard
  labels:
    app.kubernetes.io/name: aws-cost-dashboard
    app.kubernetes.io/component: redis
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aws-cost-dashboard
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aws-cost-dashboard
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: redis-sa
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 999     # redis user UID in the official image
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          # AOF persistence for durability — safe to remove if cache-only usage
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --loglevel
            - notice
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      terminationGracePeriodSeconds: 30

  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app.kubernetes.io/name: aws-cost-dashboard
          app.kubernetes.io/component: redis
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ""    # set to your StorageClass, or "" for cluster default
        resources:
          requests:
            storage: 5Gi
