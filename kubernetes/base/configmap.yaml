# =============================================================================
# ConfigMap — non-sensitive application configuration
#
# Secrets (SECRET_KEY, JWT_SECRET_KEY, DATABASE_URL, etc.) live in secret.yaml.
# This ConfigMap holds everything safe to store in plain text.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: aws-cost-dashboard
  labels:
    app.kubernetes.io/name: aws-cost-dashboard
    app.kubernetes.io/component: backend
data:
  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  APP_NAME: "AWS Cost Dashboard"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  LOG_FILE: "/var/log/cost-dashboard/app.log"

  # ---------------------------------------------------------------------------
  # API
  # ---------------------------------------------------------------------------
  API_V1_PREFIX: "/api/v1"

  # CORS — GitHub Pages origin + any additional allowed origins.
  # Update this when your Ingress hostname changes.
  CORS_ORIGINS_STR: "https://nkrameshkrishnan.github.io,http://localhost:5173"

  # ---------------------------------------------------------------------------
  # Redis (host resolved via K8s Service DNS)
  # ---------------------------------------------------------------------------
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # ---------------------------------------------------------------------------
  # AWS
  # ---------------------------------------------------------------------------
  AWS_REGION: "us-east-1"

  # ---------------------------------------------------------------------------
  # Cache TTL (seconds)
  # ---------------------------------------------------------------------------
  CACHE_TTL_CURRENT_MONTH: "300"
  CACHE_TTL_HISTORICAL: "86400"
  CACHE_TTL_FORECAST: "3600"
  CACHE_TTL_SERVICE_BREAKDOWN: "900"
  CACHE_TTL_BUDGET_STATUS: "600"
  CACHE_TTL_AUDIT_RESULTS: "1800"

  # ---------------------------------------------------------------------------
  # Performance
  # ---------------------------------------------------------------------------
  WORKERS: "4"
  REQUEST_TIMEOUT: "120"

  # ---------------------------------------------------------------------------
  # Feature flags
  # ---------------------------------------------------------------------------
  FEATURE_RIGHTSIZING: "true"
  FEATURE_BUDGETS: "true"
  FEATURE_FINOPS_AUDIT: "true"
  FEATURE_ANALYTICS: "true"
  FEATURE_AUTOMATION: "true"
  FEATURE_UNIT_COSTS: "true"

  # ---------------------------------------------------------------------------
  # Docs / Swagger (disable in production if not needed)
  # ---------------------------------------------------------------------------
  ENABLE_DOCS: "false"
  ENABLE_TEST_ENDPOINTS: "false"

  # ---------------------------------------------------------------------------
  # JWT
  # ---------------------------------------------------------------------------
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
