# =============================================================================
# Secret — sensitive credentials (template; values must be base64-encoded)
#
# !!! DO NOT COMMIT REAL VALUES — this file is a template only !!!
#
# Encode a value:
#   echo -n "your-value" | base64
#
# Generate required keys:
#   SECRET_KEY / JWT_SECRET_KEY:
#     python -c "import secrets; print(secrets.token_urlsafe(48))"
#   ENCRYPTION_KEY (Fernet):
#     python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# In production, prefer External Secrets Operator (ESO) or Sealed Secrets to
# sync values from AWS Secrets Manager rather than storing them here.
# See: https://external-secrets.io
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: aws-cost-dashboard
  labels:
    app.kubernetes.io/name: aws-cost-dashboard
    app.kubernetes.io/component: backend
  annotations:
    description: "Backend application secrets — do not commit real values"
type: Opaque
data:
  # ---------------------------------------------------------------------------
  # Application secrets  (base64-encoded placeholders — replace before applying)
  # ---------------------------------------------------------------------------

  # python -c "import secrets; print(secrets.token_urlsafe(48))" | base64
  SECRET_KEY: REPLACE_WITH_BASE64_ENCODED_SECRET_KEY

  # python -c "import secrets; print(secrets.token_urlsafe(48))" | base64
  JWT_SECRET_KEY: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET_KEY

  # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())" | base64
  ENCRYPTION_KEY: REPLACE_WITH_BASE64_ENCODED_ENCRYPTION_KEY

  # ---------------------------------------------------------------------------
  # Database
  # For PostgreSQL in-cluster (default): postgresql://postgres:postgres@postgres:5432/aws_cost_dashboard
  # For AWS RDS: postgresql://user:pass@your-rds-endpoint.rds.amazonaws.com:5432/dbname
  # echo -n "postgresql://..." | base64
  # ---------------------------------------------------------------------------
  DATABASE_URL: REPLACE_WITH_BASE64_ENCODED_DATABASE_URL

  # PostgreSQL superuser password (must match postgres StatefulSet env)
  # echo -n "your-postgres-password" | base64
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_ENCODED_POSTGRES_PASSWORD

  # ---------------------------------------------------------------------------
  # Redis password (leave empty string if Redis has no auth)
  # echo -n "" | base64  →  (empty)
  # ---------------------------------------------------------------------------
  REDIS_PASSWORD: ""

  # ---------------------------------------------------------------------------
  # AWS credentials
  # Required when running outside AWS (no instance profile / IRSA).
  # If running on EKS with IRSA, remove these and annotate the SA instead.
  # echo -n "AKIA..." | base64
  # ---------------------------------------------------------------------------
  AWS_ACCESS_KEY_ID: REPLACE_WITH_BASE64_ENCODED_AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_BASE64_ENCODED_AWS_SECRET_ACCESS_KEY

  # ---------------------------------------------------------------------------
  # Notifications (optional)
  # ---------------------------------------------------------------------------
  TEAMS_WEBHOOK_URL: ""
  EXPORT_S3_BUCKET: ""

---
# =============================================================================
# PostgreSQL root secret (used by the postgres StatefulSet)
# Must match POSTGRES_PASSWORD above.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: aws-cost-dashboard
  labels:
    app.kubernetes.io/name: aws-cost-dashboard
    app.kubernetes.io/component: postgres
type: Opaque
data:
  # echo -n "your-postgres-password" | base64
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_ENCODED_POSTGRES_PASSWORD
