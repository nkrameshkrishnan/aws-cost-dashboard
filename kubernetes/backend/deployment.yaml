apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aws-cost-dashboard
  labels:
    app.kubernetes.io/name: aws-cost-dashboard
    app.kubernetes.io/component: backend
  annotations:
    description: "FastAPI backend — serves the REST API consumed by the GitHub Pages frontend"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aws-cost-dashboard
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # always keep at least `replicas` pods serving traffic
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aws-cost-dashboard
        app.kubernetes.io/component: backend
      annotations:
        # Force pod restart when ConfigMap or Secret changes (checksum trick).
        # Update these values by running:
        #   kubectl get cm backend-config -o json | sha256sum
        #   kubectl get secret backend-secret -o json | sha256sum
        configmap-checksum: "UPDATE_WITH_SHA256_OF_CONFIGMAP"
        secret-checksum: "UPDATE_WITH_SHA256_OF_SECRET"
    spec:
      serviceAccountName: backend-sa
      automountServiceAccountToken: false

      # -----------------------------------------------------------------------
      # Security context — enforce non-root execution
      # -----------------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # -----------------------------------------------------------------------
      # Run migrations before the first backend pod starts
      # -----------------------------------------------------------------------
      initContainers:
        - name: migrate
          image: REPLACE_WITH_ECR_IMAGE   # replaced by eks-deploy.sh with ECR URI:tag
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: backend
          # Replaced by eks-deploy.sh with ECR URI:tag  (e.g. 1234.dkr.ecr.us-east-1.amazonaws.com/aws-cost-dashboard-backend:abc1234)
          image: REPLACE_WITH_ECR_IMAGE
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # -------------------------------------------------------------------
          # Environment — non-sensitive from ConfigMap, secrets from Secret
          # -------------------------------------------------------------------
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

          # -------------------------------------------------------------------
          # Resource limits (tune based on observed usage via `kubectl top pods`)
          # -------------------------------------------------------------------
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # -------------------------------------------------------------------
          # Health probes
          # /health returns 200 when DB + Redis connections are up
          # -------------------------------------------------------------------
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 12    # allow up to 60 s for cold start
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # -------------------------------------------------------------------
          # Security context — drop all capabilities, read-only root FS
          # -------------------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # -------------------------------------------------------------------
          # Writable volumes for tmp files and logs (read-only root FS requires these)
          # -------------------------------------------------------------------
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /var/log/cost-dashboard
            - name: exports
              mountPath: /tmp/exports

      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: exports
          emptyDir: {}

      # -----------------------------------------------------------------------
      # Topology spread — distribute pods across nodes/zones for resilience
      # -----------------------------------------------------------------------
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: backend
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: backend

      # Graceful shutdown — give gunicorn time to drain in-flight requests
      terminationGracePeriodSeconds: 60
