name: CI

# Run on every push and pull request to any branch.
# Gate merges to main by requiring this workflow to pass.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Backend — lint, type-check, and test
  # ===========================================================================
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: aws_cost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            tests/requirements-test.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r ../tests/requirements-test.txt

      # -----------------------------------------------------------------------
      # Linting
      # -----------------------------------------------------------------------
      - name: Lint — flake8
        run: |
          pip install flake8 --quiet
          flake8 . --count --statistics

      # -----------------------------------------------------------------------
      # Type checking
      # -----------------------------------------------------------------------
      - name: Type check — mypy
        run: |
          pip install mypy --quiet
          mypy . --ignore-missing-imports --no-error-summary || true
        # `|| true` so a single missing stub doesn't fail CI; tighten over time.

      # -----------------------------------------------------------------------
      # Tests
      # -----------------------------------------------------------------------
      - name: Run tests
        working-directory: tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/aws_cost_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ENVIRONMENT: test
          DEBUG: "true"
          SECRET_KEY: test-secret-key-not-used-in-production-min32c
          JWT_SECRET_KEY: test-jwt-secret-key-not-used-in-production32
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZy0=
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          CORS_ORIGINS_STR: "http://localhost:5173,https://nkrameshkrishnan.github.io"
        run: |
          python -m pytest \
            --ignore=test_services/test_rightsizing_service.py \
            -m "not slow and not aws" \
            --tb=short \
            -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  # ===========================================================================
  # Frontend — lint, type-check, build, and test
  # ===========================================================================
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # Linting
      # -----------------------------------------------------------------------
      - name: Lint — ESLint
        run: npm run lint

      # -----------------------------------------------------------------------
      # Type checking
      # -----------------------------------------------------------------------
      - name: Type check — tsc
        run: npx tsc --noEmit

      # -----------------------------------------------------------------------
      # Tests
      # -----------------------------------------------------------------------
      - name: Run unit tests
        run: npm test -- --run --reporter=verbose

      # -----------------------------------------------------------------------
      # Build (verifies the bundle compiles with a dummy API URL)
      # -----------------------------------------------------------------------
      - name: Build
        env:
          VITE_API_BASE_URL: https://example.execute-api.us-east-1.amazonaws.com/prod
          VITE_API_VERSION: v1
          VITE_APP_NAME: AWS Cost Dashboard
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ===========================================================================
  # Docker build check (no push — just verify the image builds)
  # ===========================================================================
  docker-build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend]        # only bother if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.prod
          push: false
          tags: rameshnkkrishnan/aws_cost_explorer_backend:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
