[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
# pytest-asyncio 1.x requires the asyncio_mode to be declared here (unchanged from 0.x).
# If upgrading breaks tests with "PytestUnraisableExceptionWarning", add:
# filterwarnings = error::pytest.PytestUnraisableExceptionWarning
addopts =
    --verbose
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    aws: Tests requiring AWS credentials
