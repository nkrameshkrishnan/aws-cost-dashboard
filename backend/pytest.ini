[pytest]
# =============================================================================
# Backend pytest.ini — kept for local iteration on a single service.
# The canonical test project lives at /tests/ (project root).
#
# To run all tests:
#   cd tests && python -m pytest
# To run tests while iterating on backend code from this directory:
#   python -m pytest ../tests
# =============================================================================
testpaths = ../tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --verbose
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    aws: Tests requiring AWS credentials
