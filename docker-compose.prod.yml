version: "3.8"

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # Backend API (Production)
  backend:
    image: ${DOCKER_REGISTRY:-your-registry}/aws-cost-dashboard-backend:${VERSION:-latest}
    container_name: awscost-backend-prod
    restart: always
    environment:
      # Database (Use managed RDS in production)
      DATABASE_URL: ${DATABASE_URL}

      # Redis (Use managed ElastiCache in production)
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Application
      APP_NAME: "AWS Cost Dashboard API"
      APP_VERSION: ${VERSION:-1.0.0}
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}

      # API
      API_V1_PREFIX: /api/v1

      # CORS - Set to your frontend URL
      CORS_ORIGINS: ${CORS_ORIGINS}

      # Security - IMPORTANT: Set these via environment variables or secrets manager
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # AWS Credentials (use IAM roles in production)
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "8000:8000"
    # Do NOT mount volumes in production - use image
    # volumes:
    #   - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - awscost-network-prod

  # Frontend (Production - Nginx)
  frontend:
    image: ${DOCKER_REGISTRY:-your-registry}/aws-cost-dashboard-frontend:${VERSION:-latest}
    container_name: awscost-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    # volumes:
    #   - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL certificates
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - awscost-network-prod

networks:
  awscost-network-prod:
    driver: bridge
