version: "3.8"

# =============================================================================
# Production Docker Compose
#
# Usage:
#   docker-compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# ALL configuration lives in .env.production at the project root.
# Do not hard-code values here; add new vars to .env.production instead.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  backend:
    image: ${DOCKER_REGISTRY}/aws-cost-dashboard-backend:${VERSION:-latest}
    container_name: awscost-backend-prod
    restart: always
    env_file:
      - .env.production           # <-- single source of truth for all backend vars
    ports:
      - "8000:8000"
    command: >
      gunicorn app.main:app
        --workers ${WORKERS:-4}
        --worker-class uvicorn.workers.UvicornWorker
        --bind 0.0.0.0:8000
        --timeout ${REQUEST_TIMEOUT:-120}
        --keep-alive 5
        --access-logfile -
        --error-logfile -
        --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - awscost-prod

  # ---------------------------------------------------------------------------
  # Frontend (Nginx serving pre-built Vite bundle)
  # ---------------------------------------------------------------------------
  frontend:
    image: ${DOCKER_REGISTRY}/aws-cost-dashboard-frontend:${VERSION:-latest}
    container_name: awscost-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - awscost-prod

networks:
  awscost-prod:
    driver: bridge

# =============================================================================
# Build targets (used when building images before pushing to registry)
#
# To build both images with vars from .env.production:
#
#   export $(grep -v '^#' .env.production | xargs)
#   docker build \
#     --build-arg VITE_API_BASE_URL=$VITE_API_BASE_URL \
#     --build-arg VITE_API_VERSION=$VITE_API_VERSION \
#     --build-arg VITE_APP_NAME="$VITE_APP_NAME" \
#     --build-arg VITE_APP_VERSION=$VITE_APP_VERSION \
#     -f frontend/Dockerfile.prod -t $DOCKER_REGISTRY/aws-cost-dashboard-frontend:$VERSION ./frontend
#
#   docker build \
#     -f backend/Dockerfile.prod -t $DOCKER_REGISTRY/aws-cost-dashboard-backend:$VERSION ./backend
#
# Or use `scripts/build-prod.sh` which handles both automatically.
# =============================================================================
