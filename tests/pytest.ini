[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Make the backend application importable without installing it as a package
pythonpath = ../backend

# pytest-asyncio
asyncio_mode = auto

addopts =
    --verbose
    --cov=app
    --cov-report=html:../coverage/html
    --cov-report=term-missing
    --cov-report=xml:../coverage/coverage.xml
    --cov-fail-under=80

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require running services)
    slow: Slow tests (skipped in fast-feedback mode)
    aws: Tests that require real AWS credentials
